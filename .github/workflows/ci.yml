name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Prepare worker wrangler config
        run: |
          cp worker/wrangler.toml.example worker/wrangler.toml
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/' worker/wrangler.toml
          sed -i 's/REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID/11111111111111111111111111111111/' worker/wrangler.toml

      - name: Build frontend
        run: npm run build

      - name: Build worker
        run: npm --prefix worker run build

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Typecheck worker
        run: npm run typecheck:worker

      - name: Run tests
        run: npm run test
