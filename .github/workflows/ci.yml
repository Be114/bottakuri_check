name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Build frontend
        run: npm run build

      - name: Build worker
        run: npm --prefix worker run build

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Typecheck worker
        run: npm run typecheck:worker

      - name: Run tests
        run: npm run test
